<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Kwano Rides SA - Premium Ride-Share</title>
    <!-- Premium PWA configuration integrations -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kwano Rides SA" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- Advanced Mobile Visual Debugger & Exception Shield to instantly isolate and resolve blank screen issues -->
    <script>
      (function() {
        var logs = [];
        var maxLogs = 30;
        
        function appendToLog(prefix, args) {
          var line = prefix + ' ' + Array.prototype.slice.call(args).map(function(val) {
            try {
              if (typeof val === 'object' && val !== null) {
                return JSON.stringify(val);
              }
              return String(val);
            } catch(e) {
              return '[Unserializable Object]';
            }
          }).join(' ');
          logs.push(line);
          if (logs.length > maxLogs) logs.shift();
        }

        function showDebugPanel(title, message, stack) {
          // Exclude benign or non-blocking warnings from flooding the visual debug view
          if (message && (
              message.indexOf('ResizeObserver') !== -1 || 
              message.indexOf('websocket') !== -1 ||
              message.indexOf('HMR') !== -1
          )) {
            return;
          }

          var overlay = document.getElementById('debug-fatal-overlay');
          if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'debug-fatal-overlay';
            overlay.style.cssText = 'position:fixed;top:4px;left:4px;right:4px;bottom:4px;background:#050505;color:#fff;z-index:2147483647;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace;padding:18px;overflow-y:auto;box-sizing:border-box;font-size:12px;line-height:1.5;border:2px solid #ef4444;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.9);display:flex;flex-direction:column;';
            document.documentElement.appendChild(overlay);
          }

          var content = '';
          content += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">';
          content += '  <div style="background:#ef4444;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;">✕</div>';
          content += '  <div>';
          content += '    <h3 style="margin:0;font-size:14px;font-weight:900;text-transform:uppercase;color:#ef4444;letter-spacing:0.5px;">' + title + '</h3>';
          content += '    <span style="font-size:10px;color:#6b7280;text-transform:uppercase;">Application Launch Incident Diagnostics</span>';
          content += '  </div>';
          content += '</div>';

          content += '<div style="background:#1a1a1a;border-left:4px solid #ef4444;padding:12px;border-radius:6px;margin-bottom:14px;color:#fca5a5;font-weight:700;font-family:monospace;font-size:11px;word-break:break-all;">';
          content += message;
          content += '</div>';

          if (stack) {
            content += '<div style="margin-bottom:14px;flex:1;min-height:100px;display:flex;flex-direction:column;">';
            content += '  <span style="font-size:10px;text-transform:uppercase;color:#888;font-weight:bold;margin-bottom:4px;display:block;">Trace Details:</span>';
            content += '  <pre style="background:#000;padding:10px;border-radius:8px;font-size:10px;color:#cbd5e1;overflow-x:auto;border:1px solid #222;margin:0;flex:1;font-family:monospace;white-space:pre-wrap;word-break:break-all;">' + stack + '</pre>';
            content += '</div>';
          }

          content += '<div style="margin-bottom:16px;">';
          content += '  <span style="font-size:10px;text-transform:uppercase;color:#888;font-weight:bold;margin-bottom:4px;display:block;">Activity Console Streams:</span>';
          content += '  <div style="background:#0f0f0f;height:110px;overflow-y:auto;border:1px solid #1a1a1a;border-radius:8px;padding:8px;font-family:monospace;font-size:9.5px;color:#a3a3a3;">';
          for (var i = 0; i < logs.length; i++) {
            var rowColor = logs[i].indexOf('[ERR]') !== -1 ? '#fca5a5' : '#a3a3a3';
            content += '<div style="border-bottom:1px solid #141414;padding:3px 0;word-break:break-all;color:' + rowColor + ';">' + logs[i] + '</div>';
          }
          if (logs.length === 0) {
            content += '<div style="color:#525252;font-style:italic;">No logged events before crash.</div>';
          }
          content += '  </div>';
          content += '</div>';

          content += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:auto;">';
          content += '  <button onclick="window.location.reload(true);" style="background:#f5b400;color:#000;border:none;padding:12px;border-radius:10px;font-weight:bold;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;">Click to Force Refresh</button>';
          content += '  <button onclick="if(window.caches){caches.keys().then(function(ns){ns.forEach(function(n){caches.delete(n)})})};localStorage.clear();sessionStorage.clear();window.location.reload(true);" style="background:#222;color:#fff;border:1px solid #333;padding:12px;border-radius:10px;font-weight:bold;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px;">Deep Cache Restructuring Reboot</button>';
          content += '</div>';

          overlay.innerHTML = content;
        }

        // Tap into standard console.error
        var origError = console.error;
        console.error = function() {
          appendToLog('[ERR]', arguments);
          origError.apply(console, arguments);
          
          var primaryArg = arguments[0];
          if (primaryArg) {
            var msg = String(primaryArg);
            showDebugPanel('Diagnostic Console Alert', msg, arguments[1] ? String(arguments[1]) : '');
          }
        };

        // Tap into standard console.log
        var origLog = console.log;
        console.log = function() {
          appendToLog('[INFO]', arguments);
          origLog.apply(console, arguments);
        };

        window.addEventListener('error', function(e) {
          var msg = e.message || 'Runtime execution exception';
          var file = e.filename || 'bundle.js';
          var line = e.lineno || '0';
          var col = e.colno || '0';
          var details = msg + ' at ' + file + ':' + line + ':' + col;
          var stack = e.error ? e.error.stack : 'Stacktrace not constructed';
          
          showDebugPanel('Uncaught Module Exception', details, stack);
        });

        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason;
          var msg = 'Unhandled async operation';
          var stack = 'No additional stack tracing';
          
          if (reason) {
            if (typeof reason === 'object') {
              try {
                msg = reason.message || JSON.stringify(reason);
              } catch (strError) {
                msg = reason.message || 'Object properties could not be fully serialized';
              }
              stack = reason.stack || stack;
            } else {
              msg = String(reason);
            }
          }
          showDebugPanel('Unhandled Async Rejection', msg, stack);
        });
      })();
    </script>
  </head>
  <body class="bg-black select-none overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
